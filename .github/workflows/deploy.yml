name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - name: Build Main
        working-directory: apps/main
        run: npx next build
        env:
          NEXT_PUBLIC_BASE_PATH: /SanaaServices
          NEXT_PUBLIC_TRAVEL_URL: /SanaaServices/travel

      - name: Build Travel
        working-directory: apps/premium-travel
        run: npx next build
        env:
          NEXT_PUBLIC_BASE_PATH: /SanaaServices/travel

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r apps/main/out/* _site/
          mkdir -p _site/travel
          cp -r apps/premium-travel/out/* _site/travel/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
